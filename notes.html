<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>專案注意事項</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Microsoft JhengHei","PingFang TC",sans-serif;background:#FAF9F7;color:#4A5158;padding:0 0 60px}
.top{background:#2E5B8F;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5}
.top h1{font-size:17px;margin:0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top a{color:#fff;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:6px 12px;font-size:12.5px;font-weight:700;text-decoration:none;white-space:nowrap}
.wrap{max-width:920px;margin:0 auto;padding:18px}
.budget{background:#F1EBDD;border:1px solid #E5D9BF;border-radius:10px;padding:12px 16px;font-size:15px;font-weight:700;color:#8A7B5C;margin-bottom:16px}
.task{background:#fff;border:1px solid #E2DED8;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.tname{font-size:15px;font-weight:800;color:#2E5B8F;margin-bottom:4px}
.tmeta{font-size:12.5px;color:#9A948C;margin-bottom:8px}
.fee{display:inline-block;background:#EAF1E6;color:#3E6A3E;border-radius:5px;padding:1px 8px;font-weight:700;margin-left:6px}
.blk{margin-top:8px}
.blk .lb{font-size:12px;font-weight:800;color:#8A9BA8;margin-bottom:2px}
.blk .tx{font-size:13.5px;color:#3A4652;white-space:pre-wrap;line-height:1.6}
.done{color:#9CAF88;font-weight:700;font-size:12px;margin-left:6px}
.empty{text-align:center;color:#9A948C;padding:60px 20px;font-size:14px;line-height:2}
.hint{font-size:12px;color:#A8A29A;margin-top:14px;line-height:1.7}
</style>
</head>
<body>
<div class="top"><h1 id="title">📝 注意事項</h1><a href="#" id="ganttLink">📅 看甘特圖</a></div>
<div class="wrap" id="body"><div class="empty">載入中…</div></div>
<script>
const esc=t=>String(t==null?'':t).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function qs(k){const m=new RegExp('[?&]'+k+'=([^&]+)').exec(location.search);return m?decodeURIComponent(m[1]):null;}
function stepsText(s){ if(!s)return''; if(Array.isArray(s))return s.map(x=>typeof x==='object'?(x.name||x.text||x.title||''):x).filter(Boolean).join('、'); return String(s); }
function load(){
  const pid=qs('p');
  let data=[];try{data=JSON.parse(localStorage.getItem('engMgmtProData')||'[]');}catch(e){}
  const p=data.find(x=>String(x.id)===String(pid))|| (isNaN(pid)?null:data.filter(x=>!x.isDaily&&!x.archived)[Number(pid)]) || null;
  const body=document.getElementById('body');
  if(!p){ body.innerHTML='<div class="empty">找不到這個專案的資料<br>請先在「甘特圖／排程」開一次以完成雲端同步</div>'; return; }
  document.getElementById('title').textContent='📝 '+p.name+' · 注意事項';
  document.getElementById('ganttLink').href='https://a0970563546-maker.github.io/engmanagement/#p='+encodeURIComponent(p.id!=null?p.id:pid)+'&v=gantt';
  let h='<div class="budget">💰 總預算：'+esc(p.totalBudget||'—')+' 元（含稅）</div>';
  const tasks=p.tasks||[];
  if(!tasks.length){ h+='<div class="empty">此專案尚無任務／注意事項</div>'; }
  tasks.forEach(t=>{
    h+='<div class="task"><div class="tname">'+esc(t.name)+(t.done?'<span class="done">✓ 完成</span>':'')+'</div>';
    h+='<div class="tmeta">'+esc(t.startDate||'—')+' ~ '+esc(t.endDate||'—')+'<span class="fee">費用 '+esc(t.taskBudget||'—')+'</span></div>';
    if(t.detail){ h+='<div class="blk"><div class="lb">明細 / 報價 / 簽呈</div><div class="tx">'+esc(t.detail)+'</div></div>'; }
    const st=stepsText(t.steps);
    if(st){ h+='<div class="blk"><div class="lb">步驟</div><div class="tx">'+esc(st)+'</div></div>'; }
    h+='</div>';
  });
  h+='<div class="hint">※ 此頁為檢視。要編輯價格／報價／簽呈，請到「甘特圖／排程」解鎖後，用左側任務的「📋 明細」修改，這裡會同步更新。</div>';
  body.innerHTML=h;
}
load();
</script>
</body>
</html>
