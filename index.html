<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>рҹҸ—пёҸ иЁӯиЁҲе·ҘзЁӢе№іеҸ°</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Microsoft JhengHei","PingFang TC",sans-serif;display:flex;height:100vh;overflow:hidden;background:#F4F5F7}
#side{width:248px;background:#FAFAF8;border-right:1px solid #E5E5E0;display:flex;flex-direction:column;padding:12px 8px;flex-shrink:0;overflow-y:auto}
.brand{font-weight:800;font-size:15.5px;color:#2E5B8F;padding:6px 10px 12px;border-bottom:1px solid #ECECE6;margin-bottom:2px;line-height:1.3}
.grp{font-size:11px;color:#9A9A93;font-weight:700;letter-spacing:.08em;margin:14px 10px 6px}
.it{display:flex;gap:8px;align-items:center;padding:8px 12px;border-radius:8px;font-size:14px;color:#4A5158;cursor:pointer;border:0;background:none;width:100%;text-align:left;font-family:inherit;line-height:1.3}
.it:hover{background:#EFEFEA}
.it.on{background:#E7EDF5;color:#2E5B8F;font-weight:700}
.it.proj{font-weight:700;color:#3A4652}
.projrow{display:flex;align-items:center}
.pcheck{margin:0 2px 0 12px;width:15px;height:15px;cursor:pointer;flex-shrink:0;accent-color:#2E5B8F}
.projname{padding-left:6px}
.it.sub{padding-left:32px;font-size:13px;color:#5F6B76}
.it.sub.on{color:#2E5B8F}
.arrow{font-size:10px;color:#9AA7B2;width:12px;transition:transform .15s;flex-shrink:0}
.proj.open .arrow{transform:rotate(90deg)}
.nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.subs{display:none}
.subs.open{display:block}
.empty{font-size:12px;color:#B0ACA4;padding:6px 12px;line-height:1.6}
.foot{margin-top:auto;font-size:11px;color:#B8B8B0;padding:10px;line-height:1.6}
.cloudctl{margin-top:9px;padding:8px;border:1px solid #D8E3ED;border-radius:8px;background:#F3F7FB;color:#49647F;font:700 11px inherit;cursor:pointer;width:100%;text-align:left;line-height:1.5}
.cloudctl.ok{background:#EDF7F0;border-color:#CFE5D5;color:#4F7559}
.cloudctl.err{background:#FFF5F2;border-color:#F0D2CA;color:#9B584E}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{display:none;background:#2E5B8F;color:#fff;padding:10px 14px;font-weight:700;font-size:15px;align-items:center;gap:10px}
#burger{background:none;border:0;color:#fff;font-size:20px;cursor:pointer;padding:0}
iframe{border:0;width:100%;height:100%;flex:1;background:#fff}
#mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:40}
@media(max-width:768px){
  #side{position:fixed;left:-260px;top:0;height:100%;z-index:50;transition:left .2s;box-shadow:2px 0 12px rgba(0,0,0,.15)}
  #side.open{left:0}
  #topbar{display:flex}
  #mask.open{display:block}
}
</style>
</head>
<body>
<div id="mask" onclick="closeSide()"></div>
<div id="side">
  <div class="brand">рҹҸ—пёҸ иЁӯиЁҲе·ҘзЁӢе№іеҸ°</div>

  <div class="grp">ж—Ҙеёё</div>
  <button class="it" data-src="https://a0970563546-maker.github.io/todo-v2/?v=20260714-draft-safe">рҹ“Ӣ еҫ…иҫҰиҝҪи№Ө</button>

  <div class="grp">е°ҲжЎҲгҖҖ<span style="font-weight:400;text-transform:none;letter-spacing:0;color:#B0ACA4">вҳ‘еӢҫйҒёеҸҜжҜ”е°ҚжҺ’зЁӢ</span></div>
  <div id="projList"><div class="empty">вҸі ијүе…Ҙе°ҲжЎҲдёӯвҖҰ</div></div>

  <div class="grp" id="archGrp" style="display:none">е·ІзөҗжЎҲ</div>
  <div id="archList"></div>

  <div class="grp">е» е•Ҷ</div>
  <button class="it" data-src="https://a0970563546-maker.github.io/vendors-v6.html?v=20260715-vendor-cloud">рҹҸў е» е•Ҷз®ЎзҗҶ</button>

  <div class="grp">ең–жӘ”</div>
  <button class="it" data-src="https://a0970563546-maker.github.io/drawings.html?v=20260713-cats">рҹ—ӮпёҸ ең–жӘ”иіҮиЁҠ</button>

  <div class="foot">иЁӯиЁҲе·ҘзЁӢе№іеҸ°<br>иіҮж–ҷйӣІз«ҜеҗҢжӯҘгғ»зӣҙжҺҘз·ЁијҜ</div>
</div>
<iframe id="portalCloudFrame" title="е…¬еҸёйӣІз«ҜеҗҢжӯҘ" hidden></iframe>
<div id="main">
  <div id="topbar"><button id="burger" onclick="openSide()">вҳ°</button><span id="ttl">е·ҘдҪңе№іеҸ°</span></div>
  <iframe id="frame" title="жЁЎзө„е…§е®№"></iframe>
</div>
<script>
const ENG="https://a0970563546-maker.github.io/engmanagement/";
const PROJECT_BUILD="20260715-holidays-2027";
const WORKSPACE_GATEWAY="https://script.google.com/a/macros/mofan.co.com/s/AKfycbwKlTRyXZEuby9oR3GMs_zJJtFUSqML1xhfQgQN52frOrHGmi-8DFioKvMbFCYqinjK/exec";
let portalCloudTarget=null,portalCloudReady=false,portalCloudSeq=0,portalCloudSaveTimer=null;
const portalCloudPending=new Map();
const cloudButton=document.createElement('button');
cloudButton.className='cloudctl';
cloudButton.textContent='вҳҒ е…¬еҸёйӣІз«ҜпјҡжӯЈеңЁйҖЈз·ҡвҖҰ';
document.querySelector('.foot').appendChild(cloudButton);
const backupButton=document.createElement('button');
backupButton.className='cloudctl';
backupButton.textContent='в¬Ү дёӢијүе°ҲжЎҲпјҸеҫ…иҫҰжҗ¬з§»жӘ”';
document.querySelector('.foot').appendChild(backupButton);
function setPortalCloudState(text,kind=''){cloudButton.textContent='вҳҒ е…¬еҸёйӣІз«Ҝпјҡ'+text;cloudButton.className='cloudctl'+(kind?' '+kind:'')}
function readLocalArray(key){try{const value=JSON.parse(localStorage.getItem(key)||'[]');return Array.isArray(value)?value:[]}catch(error){return[]}}
function portalCloudCall(action,payload){return new Promise((resolve,reject)=>{if(!portalCloudReady||!portalCloudTarget){reject(new Error('е…¬еҸёйӣІз«Ҝе°ҡжңӘйҖЈз·ҡ'));return}const id='portal_'+Date.now()+'_'+(++portalCloudSeq);portalCloudPending.set(id,{resolve,reject});portalCloudTarget.postMessage({source:'mofan-portal-platform',action,id,payload},'*');setTimeout(()=>{if(portalCloudPending.has(id)){portalCloudPending.delete(id);reject(new Error('е…¬еҸёйӣІз«ҜеӣһжҮүйҖҫжҷӮ'))}},30000)})}
async function bootstrapPortalCloud(){setPortalCloudState('еҗҢжӯҘе°ҲжЎҲиҲҮеҫ…иҫҰдёӯвҖҰ');try{const result=await portalCloudCall('bootstrapWorkspaceData',{projects:readLocalArray('engMgmtProData'),todos:readLocalArray('design_todo_v1')});if(result&&Array.isArray(result.projects)){localStorage.setItem('engMgmtProData',JSON.stringify(result.projects));renderProjects()}if(result&&Array.isArray(result.todos))localStorage.setItem('design_todo_v1',JSON.stringify(result.todos));setPortalCloudState('е·ІеҗҢжӯҘ','ok');if(frame&&frame.contentWindow)frame.contentWindow.postMessage({t:'workspaceDataSynced'},location.origin)}catch(error){setPortalCloudState('и«ӢйҖЈжҺҘе…¬еҸёеёіиҷҹ','err')}}
function queuePortalCloudSave(){if(!portalCloudReady)return;clearTimeout(portalCloudSaveTimer);portalCloudSaveTimer=setTimeout(async()=>{try{await portalCloudCall('saveWorkspaceData',{projects:readLocalArray('engMgmtProData'),todos:readLocalArray('design_todo_v1')});setPortalCloudState('е·ІеҗҢжӯҘ','ok')}catch(error){setPortalCloudState('еҗҢжӯҘеӨұж•—пјҢи«ӢйҮҚи©Ұ','err')}},500)}
function openPortalCloudLogin(){window.open(WORKSPACE_GATEWAY+'?mode=bridge&client=portal','mofanPortalWorkspace');const bridge=document.getElementById('portalCloudFrame');bridge.src=WORKSPACE_GATEWAY+'?mode=bridge&client=portal&v='+Date.now();setPortalCloudState('зӯүеҫ…е…¬еҸёеёіиҷҹжҺҲж¬ҠвҖҰ')}
cloudButton.addEventListener('click',openPortalCloudLogin);
function downloadWorkspaceBackup(){const projects=readLocalArray('engMgmtProData'),todos=readLocalArray('design_todo_v1');if(!projects.length&&!todos.length){alert('йҖҷеҖӢ Chrome дҪҝз”ЁиҖ…зӣ®еүҚжІ’жңүе°ҲжЎҲжҲ–еҫ…иҫҰиіҮж–ҷпјҢи«ӢеҲҮеҲ°зңӢеҫ—еҲ°еҺҹиіҮж–ҷзҡ„ Chrome дҪҝз”ЁиҖ…еҫҢеҶҚдёӢијүгҖӮ');return}const payload={type:'design-engineering-platform-backup',version:1,exportedAt:new Date().toISOString(),projects,todos};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const link=document.createElement('a');link.href=url;link.download='иЁӯиЁҲе·ҘзЁӢе№іеҸ°_е°ҲжЎҲеҫ…иҫҰжҗ¬з§»жӘ”_'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(link);link.click();link.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}
backupButton.addEventListener('click',downloadWorkspaceBackup);
function initPortalCloud(){document.getElementById('portalCloudFrame').src=WORKSPACE_GATEWAY+'?mode=bridge&client=portal&v='+Date.now()}
function openSide(){document.getElementById('side').classList.add('open');document.getElementById('mask').classList.add('open');}
function closeSide(){document.getElementById('side').classList.remove('open');document.getElementById('mask').classList.remove('open');}
const frame=document.getElementById('frame'), ttl=document.getElementById('ttl');
let curSrc=null;
function nav(src,label,el){
  document.querySelectorAll('.it').forEach(i=>i.classList.remove('on'));
  if(el)el.classList.add('on');
  if(src!==curSrc){ frame.src=src; curSrc=src; }
  ttl.textContent=label||'е·ҘдҪңе№іеҸ°';
  try{localStorage.setItem('portal_last',JSON.stringify({src,label}));}catch(e){}
  closeSide();
}
// static items
document.querySelectorAll('.it[data-src]').forEach(b=>b.onclick=()=>nav(b.dataset.src,b.textContent.trim(),b));

function allData(){let d=[];try{d=JSON.parse(localStorage.getItem('engMgmtProData')||'[]');}catch(e){}return Array.isArray(d)?d:[];}
function getProjects(){return allData().filter(p=>!p.isDaily&&!p.archived);}
function getArchived(){return allData().filter(p=>!p.isDaily&&p.archived);}
function projRow(p,i,withCheck){
  const id=p.id!=null?p.id:i;
  const nm=(p.name||'жңӘе‘ҪеҗҚе°ҲжЎҲ').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  const cb=withCheck?'<input type="checkbox" class="pcheck" data-id="'+encodeURIComponent(id)+'">':'';
  return '<div class="projrow">'+cb+'<button class="it proj projname" data-src="https://a0970563546-maker.github.io/project.html?p='+encodeURIComponent(id)+'&v='+PROJECT_BUILD+'" data-label="'+nm+'"><span class="nm">'+(withCheck?'рҹ“җ ':'рҹ“Ұ ')+nm+'</span></button></div>';
}
function updateCompare(){
  const ids=[...document.querySelectorAll('#projList .pcheck:checked')].map(c=>c.dataset.id);
  if(ids.length){ nav('https://a0970563546-maker.github.io/allgantt.html?ids='+ids.join(',')+'&v=20260715-holidays-2027','жҺ’зЁӢжҜ”е°ҚпјҲ'+ids.length+' жЎҲпјү',null); }
}
function renderProjects(){
  const projs=getProjects(), arch=getArchived();
  const box=document.getElementById('projList');
  box.innerHTML=projs.length?projs.map((p,i)=>projRow(p,i,true)).join(''):'<div class="empty">е°ҡз„ЎйҖІиЎҢдёӯе°ҲжЎҲ<br>е…Ҳй–Ӣд»»дёҖжЁЎзө„е®ҢжҲҗйӣІз«ҜеҗҢжӯҘ</div>';
  document.getElementById('archGrp').style.display=arch.length?'':'none';
  document.getElementById('archList').innerHTML=arch.map((p,i)=>projRow(p,i,false)).join('');
  document.querySelectorAll('.projname').forEach(b=>b.onclick=()=>nav(b.dataset.src,b.dataset.label,b));
  box.querySelectorAll('.pcheck').forEach(c=>c.onchange=updateCompare);
}
renderProjects();
// auto-refresh sidebar when a project is changed (e.g. archived) from the iframe
window.addEventListener('storage',function(e){
  if(e.key==='engMgmtProData')renderProjects();
  if(e.key==='engMgmtProData'||e.key==='design_todo_v1')queuePortalCloudSave();
});
let vendorCloudBridge=null;
window.addEventListener('message',function(e){
  const message=e.data||{};
  const frame=document.getElementById('frame');
  if(message.source==='mofan-portal-cloud'){
    let trusted=false;
    try{const host=new URL(e.origin).hostname;trusted=host==='script.google.com'||host.endsWith('.googleusercontent.com')}catch(error){}
    if(!trusted)return;
    portalCloudTarget=e.source;
    if(message.type==='ready'){
      portalCloudReady=true;
      bootstrapPortalCloud();
      return;
    }
    if(message.type==='response'&&portalCloudPending.has(message.id)){
      const pending=portalCloudPending.get(message.id);portalCloudPending.delete(message.id);
      if(message.ok)pending.resolve(message.data);else pending.reject(new Error(message.error||'е…¬еҸёйӣІз«Ҝж“ҚдҪңеӨұж•—'));
    }
    return;
  }
  if(message.source==='mofan-vendor-cloud'){
    let trusted=false;
    try{const host=new URL(e.origin).hostname;trusted=host==='script.google.com'||host.endsWith('.googleusercontent.com')}catch(error){}
    if(!trusted)return;
    vendorCloudBridge=e.source;
    if(frame&&frame.contentWindow)frame.contentWindow.postMessage(message,location.origin);
    return;
  }
  if(message.source==='mofan-vendor-platform'){
    if(e.origin!==location.origin||e.source!==frame.contentWindow||!vendorCloudBridge)return;
    vendorCloudBridge.postMessage(message,'*');
    return;
  }
  if(message.t==='engProChanged')renderProjects();
});
initPortalCloud();
// refresh from cloud if configured
(function(){
  let cu=null;try{cu=localStorage.getItem('engMgmtCloudUrl');}catch(e){}
  if(cu){ fetch(cu).then(r=>r.json()).then(arr=>{ if(Array.isArray(arr)){ try{localStorage.setItem('engMgmtProData',JSON.stringify(arr));}catch(e){} renderProjects(); } }).catch(()=>{}); }
})();
// restore last view or default to todo
(function(){
  let last=null;try{last=JSON.parse(localStorage.getItem('portal_last')||'null');}catch(e){}
  if(last&&last.src&&last.src.includes('/project.html')){try{const u=new URL(last.src);u.searchParams.set('v',PROJECT_BUILD);last.src=u.href;}catch(e){}}
  if(last&&last.src){ nav(last.src,last.label,[...document.querySelectorAll('.it[data-src]')].find(b=>b.dataset.src===last.src)); }
  else{ const t=document.querySelector('.it[data-src]'); nav(t.dataset.src,t.textContent.trim(),t); }
})();
</script>
</body>
</html>
