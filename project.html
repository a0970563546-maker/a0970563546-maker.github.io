<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>專案工作頁</title>
<style>
*{box-sizing:border-box}
:root{--blue:#2E5B8F;--green:#5E8C72;--ink:#33404D;--soft:#6B7885;--line:#E6E9EE;--bg:#F5F7FA;--card:#FFFFFF}
body{margin:0;font-family:"Microsoft JhengHei","PingFang TC","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);padding:0 0 70px}
.top{background:linear-gradient(120deg,#2E5B8F,#3C6FA8);color:#fff;padding:16px 26px 0;position:sticky;top:0;z-index:8;box-shadow:0 2px 10px rgba(30,60,110,.18)}
.toprow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding-bottom:12px}
.top h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.5px}
.arch-badge{background:#8A7B5C;color:#fff;border-radius:999px;padding:3px 12px;font-size:12px;font-weight:800}
.spacer{flex:1}
.btn{border:0;border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}
.pdf{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.35)}
.archbtn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.3)}
.lockbtn{background:#F4EEDF;color:#8A7B5C}.lockbtn.on{background:#6FA98A;color:#fff}
.savenote{font-size:12.5px;font-weight:700}.savenote.ok{color:#CDEAD9}.savenote.ing{color:#FCE9C4}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{background:rgba(255,255,255,.10);color:#DCE7F2;border:0;border-radius:10px 10px 0 0;padding:10px 18px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.tab.on{background:var(--bg);color:var(--blue)}
.wrap{max-width:1240px;margin:0 auto;padding:20px 22px}
/* budget strip */
.bstrip{display:flex;gap:14px;flex-wrap:wrap;align-items:stretch;margin-bottom:20px}
.bcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 18px;min-width:150px;box-shadow:0 3px 12px rgba(40,70,120,.05)}
.bcard .bl{font-size:12px;font-weight:800;color:var(--soft);margin-bottom:4px}
.bcard .bv{font-size:20px;font-weight:800;color:var(--ink)}
.bcard.est .bv{color:#3C6FA8}.bcard.act .bv{color:#B5723C}.bcard.over .bv{color:#C0392B}
.bcard .bv input{width:130px;font-size:18px;font-weight:800;border:1px solid #D3DAE2;border-radius:8px;padding:4px 8px;font-family:inherit;color:var(--ink)}
.bbar{flex:1;min-width:200px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 18px;box-shadow:0 3px 12px rgba(40,70,120,.05);display:flex;flex-direction:column;justify-content:center}
.bbar .track{height:14px;background:#EEF1F5;border-radius:8px;overflow:hidden;position:relative;margin-top:6px}
.bbar .fill{height:100%;background:linear-gradient(90deg,#79AE94,#5E8C72)}
.bbar .fill.over{background:linear-gradient(90deg,#E08A6B,#C0392B)}
.bbar .bt{font-size:12px;color:var(--soft);font-weight:700}
.sec-h{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:800;color:var(--blue);margin:4px 0 14px}
.sec-h .ln{flex:1;height:1px;background:var(--line)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;box-shadow:0 4px 18px rgba(40,70,120,.06);margin-bottom:24px}
.gantt{overflow-x:auto}
.gmonth{margin-bottom:20px;border-bottom:1px solid var(--line);padding-bottom:8px}
.gmonth:last-child{margin-bottom:0;border-bottom:0}
.gmonth-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:5px}.gmonth-title{font-size:14px;font-weight:800;color:var(--blue)}
.holtags{display:flex;align-items:center;gap:6px;flex-wrap:wrap}.holtag{font-size:11px;font-weight:700;color:#A44B43;background:#FBE9E6;border-radius:999px;padding:2px 8px}
.months{display:flex;position:relative;height:24px}
.mo{position:absolute;top:0;font-size:12.5px;font-weight:800;color:var(--ink);border-left:1px solid var(--line);padding:3px 0 0 6px;height:100%;overflow:hidden;white-space:nowrap}
.days{position:relative;height:22px;border-bottom:1px solid var(--line)}
.dcell{position:absolute;top:0;height:100%;font-size:10px;color:var(--soft);text-align:center;border-left:1px solid #F1F3F6;padding-top:4px}
.dcell.off{background:#F4F1EB;color:#B79E76}
.dcell.holiday{background:#FBE9E6;color:#A44B43;font-weight:800}
.tlabel{position:absolute;top:-2px;font-size:10.5px;color:#D9534F;font-weight:800;z-index:3;white-space:nowrap}
.grow{display:flex;align-items:center;height:44px;border-bottom:1px solid #F1F3F6}.grow:last-child{border-bottom:0}
.glabel{width:220px;flex-shrink:0;padding-right:12px}
.glabel .t{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.glabel .d{font-size:11px;color:var(--soft);margin-top:1px}
.gtrack{position:relative;height:100%;flex-shrink:0}
.gtrack .wknd{position:absolute;top:0;bottom:0;background:#FAF7F1}
.gtrack .wknd.holiday{background:#FBE9E6}
.gtrack .tline{position:absolute;top:0;bottom:0;width:2px;background:#D9534F;opacity:.6;z-index:2}
.bar{position:absolute;top:50%;transform:translateY(-50%);height:22px;border-radius:11px;box-shadow:0 2px 6px rgba(46,91,143,.28);display:flex;align-items:center;padding:0 9px;font-size:10.5px;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;z-index:1}
.bar.ing{background:linear-gradient(180deg,#5A88BE,#3C6FA8)}.bar.pre{background:#DCE7F3;color:#3C6FA8;border:1px dashed #7D9FC5;box-shadow:none}.bar.done{background:linear-gradient(180deg,#79AE94,#5E8C72)}
.legend{font-size:12px;color:var(--soft);margin-top:14px}
table.sch,table.v{border-collapse:collapse;width:100%;font-size:13.5px}
table.sch th,table.sch td,table.v th,table.v td{border:1px solid var(--line);padding:7px 9px;text-align:left}
table.sch th,table.v th{background:#F4F7FA;color:var(--soft);font-size:12px;white-space:nowrap}
table.sch input[type=text],table.v input[type=text]{width:100%;border:1px solid #D3DAE2;border-radius:6px;padding:5px 7px;font-family:inherit;font-size:13px}
table.sch input[type=date]{border:1px solid #D3DAE2;border-radius:6px;padding:4px 6px;font-family:inherit;font-size:12.5px}
.sch-vendor{font-size:12.5px;color:var(--blue);font-weight:700}.sch-state{font-size:11px;color:var(--soft);white-space:nowrap}
.sch-dates{display:flex;align-items:center;gap:5px;min-width:245px}.sch-dates input{min-width:112px;width:112px}
.sch{margin-top:16px}
/* flow */
.tcard{border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px;background:#FCFDFE}
.tcard .th{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.tt{font-size:15.5px;font-weight:800;color:var(--blue)}
.badge{font-size:11px;font-weight:700;border-radius:999px;padding:2px 10px}
.badge.done{background:#E4F0E9;color:#4B7A60}.badge.wait{background:#F0EDE6;color:#8A7B5C}
.tmeta{font-size:12.5px;color:var(--soft);margin-bottom:8px}
.flab{font-size:12px;font-weight:800;color:#8A9BA8;margin:2px 0 3px}
.notebox{width:100%;min-height:54px;border:1px solid #D3DAE2;border-radius:8px;padding:8px 10px;font-size:13.5px;font-family:inherit;resize:vertical}
.noteview{font-size:13.5px;color:var(--ink);white-space:pre-wrap;line-height:1.6}
.fitem{border:1px solid #EDEFF3;border-radius:10px;padding:9px 12px;margin-top:8px;background:#fff}
.fitem .fh{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.fitem .ft{font-size:13px;font-weight:800;color:var(--blue)}
.checks{display:flex;flex-wrap:wrap;gap:10px 16px}
.checks label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--soft)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{font-size:11.5px;font-weight:700;border-radius:999px;padding:3px 10px;background:#EEF1F5;color:#8A93A0}
.tag.on{background:#E4F0E9;color:#3E7A5B}
.adder{margin-top:10px;display:flex;gap:8px;align-items:center}
.adder select{border:1px solid #D3DAE2;border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;color:var(--ink)}
.rmv{background:#fff;color:#B5564E;border:1px solid #E3B7B3;border-radius:6px;padding:4px 9px;font-size:12px;font-weight:700;cursor:pointer}
.ed{display:none}.editing .ed{display:block}.editing .ro{display:none}
.vcat{border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:16px;background:#FCFDFE}
.vcat .ch{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.vcat .ct{font-size:15px;font-weight:800;color:var(--blue)}
.vcat input.catname{font-size:15px;font-weight:800;color:var(--blue);border:1px solid #D3DAE2;border-radius:8px;padding:4px 10px;font-family:inherit}
.selbtn{border:1px solid #C7D5E4;background:#fff;color:#5F6B76;border-radius:8px;padding:4px 12px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:inherit}
.selbtn.on{background:#3C6FA8;border-color:#3C6FA8;color:#fff}
.vlow{margin-top:8px;font-size:13px;color:#8A7B5C;font-weight:700}.vlow b{color:#B5723C}
.selmark{color:#3C6FA8;font-weight:800}
.miniadd{background:#EAF1E6;color:#3E6A3E;border:1px solid #9CC49C;border-radius:7px;padding:5px 12px;font-size:12.5px;font-weight:700;cursor:pointer;margin-top:8px}
.addbtn{background:var(--green);color:#fff;border:0;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.hint{font-size:12px;color:#A8AEB6;margin-top:8px}
.empty{text-align:center;color:var(--soft);padding:40px 20px;font-size:14px;line-height:2}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="top">
  <div class="toprow">
    <h1 id="title">專案工作頁</h1>
    <span id="archBadge"></span>
    <span class="spacer"></span>
    <span class="savenote" id="savenote"></span>
    <button class="btn archbtn" id="archBtn" onclick="toggleArchive()">📦 結案</button>
    <button class="btn pdf" onclick="exportPdf()">🖨 A4 PDF</button>
    <button class="btn lockbtn" id="lock" onclick="toggleEdit()">✏️ 編輯</button>
  </div>
  <div class="tabs">
    <button class="tab on" data-t="sch" onclick="setTab('sch')">📅 排程</button>
    <button class="tab" data-t="flow" onclick="setTab('flow')">🔄 內部流程</button>
    <button class="tab" data-t="vendor" onclick="setTab('vendor')">🧾 廠商報價</button>
    <button class="tab" data-t="insp" onclick="setTab('insp')">✅ 驗收</button>
  </div>
</div>
<div class="wrap" id="root"><div class="empty">載入中…</div></div>

<script>
const HOLS={"2026-01-01":1,"2026-02-14":1,"2026-02-15":1,"2026-02-16":1,"2026-02-17":1,"2026-02-18":1,"2026-02-19":1,"2026-02-20":1,"2026-02-27":1,"2026-02-28":1,"2026-04-03":1,"2026-04-04":1,"2026-04-05":1,"2026-04-06":1,"2026-05-01":1,"2026-06-19":1,"2026-09-25":1,"2026-09-28":1,"2026-10-09":1,"2026-10-10":1,"2026-10-25":1,"2026-10-26":1,"2026-12-25":1,"2027-01-01":1};
const HOL_LABELS={
  "2026-01":[["1/1","元旦"]],
  "2026-02":[["2/14–2/20","春節連假"],["2/27–2/28","和平紀念日連假"]],
  "2026-04":[["4/3–4/6","兒童節／清明節連假"]],
  "2026-05":[["5/1","勞動節"]],
  "2026-06":[["6/19","端午節"]],
  "2026-09":[["9/25","中秋節"],["9/28","教師節"]],
  "2026-10":[["10/9–10/10","國慶日連假"],["10/25–10/26","光復節連假"]],
  "2026-12":[["12/25","行憲紀念日"]],
  "2027-01":[["1/1","元旦"]]
};
const DAY=86400000, DW=26, DEFAULT_CATS=[];
const LEGACY_CATS=['木工','水電','油漆','泥作','地板','清潔/其他'];
const FTYPES={'合約':[['sign','簽約'],['seal','用印'],['archive','歸檔']],'訂金':[['stamp','簽呈'],['transferred','已轉帳']],'尾款':[['contact','聯絡單'],['transferred','已轉帳']]};
const esc=t=>String(t==null?'':t).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const iso=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const pd=s=>{s=(s||"").replace(/-/g,"/");const p=s.split("/").map(Number);if(p.length!==3||p.some(isNaN))return null;return new Date(p[0],p[1]-1,p[2]);};
const off=d=>{const w=(d.getDay()+6)%7;return w>=5||HOLS[iso(d)]===1;};
function wdays(s,e){let n=0;const d=new Date(s);while(d<=e){if(!off(d))n++;d.setDate(d.getDate()+1);}return n;}
function qs(k){const m=new RegExp('[?&]'+k+'=([^&]+)').exec(location.search);return m?decodeURIComponent(m[1]):null;}
function num(s){const v=parseFloat(String(s==null?'':s).replace(/[^0-9.]/g,''));return isNaN(v)?null:v;}
function money(n){return n==null?'—':n.toLocaleString();}
let ALL=[],P=null,PIDX=-1,editing=false,curTab='sch',saveT=null;

function loadData(){
  try{ALL=JSON.parse(localStorage.getItem('engMgmtProData')||'[]');}catch(e){ALL=[];}
  const pid=qs('p');
  PIDX=ALL.findIndex(x=>String(x.id)===String(pid));
  if(PIDX<0&&!isNaN(pid)){const list=ALL.filter(x=>!x.isDaily);const t=list[Number(pid)];if(t)PIDX=ALL.indexOf(t);}
  P=PIDX>=0?ALL[PIDX]:null;if(P)ensureProject(P);
}
function ensureProject(p){
  if(p.projectNote===undefined)p.projectNote='';
  if(!Array.isArray(p.vendorQuotes)||!p.vendorQuotes.length)
    p.vendorQuotes=DEFAULT_CATS.map(c=>({cat:c,rows:[{n:'',d:'',a:'',m:''},{n:'',d:'',a:'',m:''},{n:'',d:'',a:'',m:''}],sel:-1,confirmed:false}));
  // 舊版曾自動建立六種工項及三列空白廠商；只移除完全未填寫的舊預設卡片，保留所有已有內容。
  p.vendorQuotes=p.vendorQuotes.filter(c=>{
    if(!LEGACY_CATS.includes(c.cat)||Number(c.sel)>=0)return true;
    const rows=Array.isArray(c.rows)?c.rows:[];
    return rows.some(r=>r&&['n','d','a','m'].some(k=>String(r[k]||'').trim()));
  });
  p.vendorQuotes.forEach(c=>{if(c.sel===undefined)c.sel=-1;if(c.confirmed===undefined)c.confirmed=false;});
  if(!Array.isArray(p.inspection))p.inspection=[];
  if(!Array.isArray(p.pettyCash))p.pettyCash=[];
  if(!Array.isArray(p.startupSteps))p.startupSteps=[];
  (p.tasks||[]).forEach(t=>{t.detail=t.detail||{};if(!Array.isArray(t.flow))t.flow=[];});
}
function cloudSave(){
  try{localStorage.setItem('engMgmtProData',JSON.stringify(ALL));}catch(e){}
  const n=document.getElementById('savenote');
  let cu=null;try{cu=localStorage.getItem('engMgmtCloudUrl');}catch(e){}
  if(cu){n.textContent='☁️ 同步中…';n.className='savenote ing';
    fetch(cu,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(ALL),mode:'no-cors'})
      .then(()=>{n.textContent='✅ 已同步';n.className='savenote ok';}).catch(()=>{n.textContent='⚠️ 本機已存';n.className='savenote ing';});
  }else{n.textContent='✅ 已存（本機）';n.className='savenote ok';}
}
function save(){ALL[PIDX]=P;clearTimeout(saveT);saveT=setTimeout(cloudSave,600);}

/* budget */
function confirmedVendorTotal(){return P.vendorQuotes.reduce((s,c)=>{const v=(c.sel>=0&&c.rows[c.sel])?num(c.rows[c.sel].a):null;return s+(v||0);},0);}
function pettyTotal(){return (P.pettyCash||[]).reduce((s,p)=>s+(num(p.amount)||0),0);}
function actTotal(){return confirmedVendorTotal()+pettyTotal();}
function budgetHTML(){
  const tb=num(P.totalBudget), act=actTotal(), remain=tb!=null?tb-act:null;
  const tbCell=editing?'<input type="text" value="'+esc(P.totalBudget||'')+'" oninput="P.totalBudget=this.value;save();refreshBudget();" placeholder="0">':money(tb);
  const overAct=tb!=null&&act>tb;
  const pctW=tb&&tb>0?Math.min(100,act/tb*100):0;
  const confCats=P.vendorQuotes.filter(c=>c.sel>=0).map(c=>esc(c.cat)+(c.rows[c.sel]&&c.rows[c.sel].n?'('+esc(c.rows[c.sel].n)+')':''));
  const pc=(P.pettyCash||[]).length;
  const bd=[];if(confCats.length)bd.push('發包：'+confCats.join('、'));if(pc)bd.push('零用金 '+pc+' 筆');
  return '<div class="bstrip">'
    +'<div class="bcard"><div class="bl">💰 總預算</div><div class="bv">'+tbCell+'</div></div>'
    +'<div class="bcard act'+(overAct?' over':'')+'"><div class="bl">💳 實際支出</div><div class="bv">'+money(act)+'</div>'+(bd.length?'<div style="font-size:11px;color:#9A948C;margin-top:4px;font-weight:600">'+bd.join('　｜　')+'</div>':'')+'</div>'
    +'<div class="bcard'+(remain!=null&&remain<0?' over':'')+'"><div class="bl">🧾 剩餘</div><div class="bv">'+money(remain)+'</div></div>'
    +'<div class="bbar"><div class="bt">實際支出 / 總預算　'+(tb?Math.round(pctW)+'%':'—')+(overAct?'　⚠️ 已超出預算':'')+'</div><div class="track"><div class="fill'+(overAct?' over':'')+'" style="width:'+pctW+'%"></div></div></div>'
    +'</div>';
}
function refreshBudget(){const el=document.getElementById('bstripWrap');if(el)el.innerHTML=budgetHTML();}

/* helpers */
function tset(i,k,v){P.tasks[i][k]=v;save();if(['name','startDate','endDate','confirmedStartDate','confirmedEndDate','done'].indexOf(k)>-1)render();}

/* 排程 */
function ganttHTML(){
  const tasks=(P.tasks||[]).map(t=>{
    const confirmed=pd(t.confirmedStartDate)&&pd(t.confirmedEndDate);
    return {name:t.name,s:confirmed?pd(t.confirmedStartDate):pd(t.startDate),e:confirmed?pd(t.confirmedEndDate):pd(t.endDate),done:t.done,confirmed:!!confirmed};
  }).filter(t=>t.s&&t.e&&t.e>=t.s);
  if(!tasks.length) return '<div class="empty">尚無排程項目'+(editing?'，於下方新增':'')+'</div>';
  const minD=new Date(Math.min(...tasks.map(t=>+t.s))),maxD=new Date(Math.max(...tasks.map(t=>+t.e)));
  const rs=new Date(minD.getFullYear(),minD.getMonth(),1),re=new Date(maxD.getFullYear(),maxD.getMonth()+1,0);
  const today=new Date();today.setHours(0,0,0,0);
  let blocks='';
  for(let cur=new Date(rs);cur<=re;cur=new Date(cur.getFullYear(),cur.getMonth()+1,1)){
    const mS=new Date(cur.getFullYear(),cur.getMonth(),1),mE=new Date(cur.getFullYear(),cur.getMonth()+1,0);
    const nd=mE.getDate(),W=nd*DW,x=d=>(d.getDate()-1)*DW;
    let days='',wknd='';
    for(let d=new Date(mS);d<=mE;d=new Date(+d+DAY)){
      const o=off(d),hol=HOLS[iso(d)]===1;
      days+='<div class="dcell'+(o?' off':'')+(hol?' holiday':'')+'" style="left:'+x(d)+'px;width:'+DW+'px">'+d.getDate()+'</div>';
      if(o)wknd+='<div class="wknd'+(hol?' holiday':'')+'" style="left:'+x(d)+'px;width:'+DW+'px"></div>';
    }
    const inMonth=today>=mS&&today<=mE,tx=inMonth?x(today):0,tline=inMonth?'<div class="tline" style="left:'+tx+'px"></div>':'';
    let rows='';
    tasks.filter(t=>t.e>=mS&&t.s<=mE).forEach(t=>{
      const clipS=t.s<mS?mS:t.s,clipE=t.e>mE?mE:t.e,left=x(clipS),width=((clipE-clipS)/DAY+1)*DW;
      const wd=wdays(t.s,t.e),sd=(t.s.getMonth()+1)+'/'+t.s.getDate(),ed=(t.e.getMonth()+1)+'/'+t.e.getDate();
      const meta=sd+'–'+ed+'・'+wd+'工作天';

}
function iset(ri,k,v){P.inspection[ri][k]=v;save();}
function iadd(){P.inspection.push({});save();render();}
function irm(ri){if(!confirm('刪除此列？'))return;P.inspection.splice(ri,1);save();render();}

/* render */
function render(keepScroll=true){
  const sx=window.scrollX,sy=window.scrollY;
  const root=document.getElementById('root');let html='<div id="bstripWrap">'+budgetHTML()+'</div>';
  if(curTab==='sch') html+='<div class="panel"><div class="sec-h">📅 '+esc(P.name)+' 排程<span class="ln"></span></div>'+ganttHTML()+(editing?schEditHTML():'')+'</div>';
  else if(curTab==='flow') html+='<div class="panel"><div class="sec-h">🔄 內部流程<span class="ln"></span></div>'+flowHTML()+'</div>';
  else if(curTab==='vendor') html+='<div class="panel"><div class="sec-h">🧾 廠商報價<span class="ln"></span>'+(editing?'<button class="addbtn" style="margin:0" onclick="vaddCat()">＋ 工項</button>':'')+'</div>'+vendorHTML()+'</div>'+expenseHTML();
  else if(curTab==='insp') html+='<div class="panel"><div class="sec-h">✅ 驗收<span class="ln"></span></div>'+inspHTML()+'</div>';
  root.innerHTML=html;document.body.classList.toggle('editing',editing);
  if(keepScroll)requestAnimationFrame(()=>window.scrollTo(sx,sy));
}
function setTab(t){curTab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));render(false);window.scrollTo(0,0);}
function toggleEdit(){editing=!editing;setLock();render();}
function setLock(){const b=document.getElementById('lock');b.textContent=editing?'👁 切換檢視':'✏️ 編輯';b.className='btn lockbtn'+(editing?' on':'');}
function toggleArchive(){
  if(!P.archived){if(!confirm('確定將「'+P.name+'」結案？結案後會移到左側「已結案專案」，資料保留、可隨時還原。'))return;P.archived=true;}
  else{if(!confirm('把「'+P.name+'」還原為進行中？'))return;P.archived=false;}
  save();updateArchiveUI();try{if(window.parent&&window.parent!==window)window.parent.postMessage({t:'engProChanged'},'*');}catch(e){}
}
function updateArchiveUI(){const b=document.getElementById('archBtn'),badge=document.getElementById('archBadge');if(P.archived){b.textContent='↩️ 還原';badge.innerHTML='<span class="arch-badge">📦 已結案</span>';}else{b.textContent='📦 結案';badge.innerHTML='';}}
function exportPdf(){
  const wasEdit=editing;editing=false;render();
  const wrap=document.createElement('div');wrap.style.cssText='padding:18px;background:#fff;width:1120px;font-family:sans-serif';
  wrap.innerHTML='<div style="font-size:20px;font-weight:800;color:#2E5B8F;margin-bottom:10px">'+esc(P.name)+'</div>'+document.getElementById('root').innerHTML;
  editing=wasEdit;render();document.body.appendChild(wrap);
  html2pdf().set({margin:8,filename:(P.name||'專案')+'.pdf',image:{type:'jpeg',quality:.95},html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'landscape'}}).from(wrap).save().then(()=>wrap.remove()).catch(()=>wrap.remove());
}
function boot(){
  loadData();
  if(!P){document.getElementById('root').innerHTML='<div class="empty">找不到這個專案<br>請先在平台開一次以完成雲端同步</div>';return;}
  document.getElementById('title').textContent='📐 '+P.name;
  setLock();updateArchiveUI();render();
}
boot();
</script>
</body>
</html>
