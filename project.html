<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>專案工作頁</title>
<style>
*{box-sizing:border-box}
:root{--blue:#2E5B8F;--green:#5E8C72;--ink:#33404D;--soft:#6B7885;--line:#E6E9EE;--bg:#F5F7FA;--card:#FFFFFF}
body{margin:0;font-family:"Microsoft JhengHei","PingFang TC","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);padding:0 0 70px}
.top{background:linear-gradient(120deg,#2E5B8F,#3C6FA8);color:#fff;padding:16px 26px 0;position:sticky;top:0;z-index:8;box-shadow:0 2px 10px rgba(30,60,110,.18)}
.toprow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding-bottom:12px}
.top h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.5px}
.chip{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:5px 14px;font-size:13px;font-weight:700}
.spacer{flex:1}
.btn{border:0;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}
.pdf{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.35)}
.lockbtn{background:#F4EEDF;color:#8A7B5C}
.lockbtn.on{background:#6FA98A;color:#fff}
.savenote{font-size:12.5px;font-weight:700}
.savenote.ok{color:#CDEAD9}.savenote.ing{color:#FCE9C4}
.tabs{display:flex;gap:4px}
.tab{background:rgba(255,255,255,.10);color:#DCE7F2;border:0;border-radius:10px 10px 0 0;padding:10px 20px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.tab.on{background:var(--bg);color:var(--blue)}
.wrap{max-width:1180px;margin:0 auto;padding:22px}
.sec-h{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:800;color:var(--blue);margin:4px 0 14px}
.sec-h .ln{flex:1;height:1px;background:var(--line)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;box-shadow:0 4px 18px rgba(40,70,120,.06);margin-bottom:24px}
/* GANTT */
.gantt{overflow-x:auto}
.gwin{min-width:680px}
.axis{margin-left:230px;position:relative}
.months{display:flex;position:relative;height:24px}
.mo{position:absolute;top:0;font-size:12.5px;font-weight:800;color:var(--ink);border-left:1px solid var(--line);padding:3px 0 0 8px;height:100%}
.days{position:relative;height:20px;border-bottom:1px solid var(--line)}
.dtick{position:absolute;top:0;font-size:10.5px;color:var(--soft);font-weight:700;transform:translateX(-1px);padding-left:3px;border-left:1px solid #EEF1F4}
.tlabel{position:absolute;top:-2px;font-size:10.5px;color:#D9534F;font-weight:800;transform:translateX(-50%);z-index:3}
.grow{display:flex;align-items:center;height:44px;border-bottom:1px solid #F1F3F6}
.grow:last-child{border-bottom:0}
.glabel{width:230px;flex-shrink:0;padding-right:14px}
.glabel .t{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.glabel .d{font-size:11.5px;color:var(--soft);margin-top:1px}
.gtrack{position:relative;flex:1;height:100%}
.gtrack .grid{position:absolute;top:0;bottom:0;width:1px;background:#F2F4F7}
.gtrack .tline{position:absolute;top:0;bottom:0;width:2px;background:#D9534F;opacity:.6}
.bar{position:absolute;top:50%;transform:translateY(-50%);height:22px;border-radius:11px;box-shadow:0 2px 6px rgba(46,91,143,.28);display:flex;align-items:center;justify-content:space-between;padding:0 9px;font-size:10.5px;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;gap:6px}
.bar.ing{background:linear-gradient(180deg,#5A88BE,#3C6FA8)}
.bar.done{background:linear-gradient(180deg,#79AE94,#5E8C72)}
.legend{font-size:12px;color:var(--soft);margin-top:14px;display:flex;gap:16px;flex-wrap:wrap}
.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:5px}
/* CARDS */
.tcard{border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px;background:#FCFDFE}
.tcard .th{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tt{font-size:15.5px;font-weight:800;color:var(--blue)}
.badge{font-size:11px;font-weight:700;border-radius:999px;padding:2px 10px}
.badge.done{background:#E4F0E9;color:#4B7A60}.badge.wait{background:#F0EDE6;color:#8A7B5C}
.tmeta{font-size:12.5px;color:var(--soft);margin:6px 0}
.fee{background:#EAF1E6;color:#3E6A3E;border-radius:6px;padding:1px 9px;font-weight:800;margin-left:4px}
.nblk{margin-top:10px}
.nblk .lb{font-size:12px;font-weight:800;color:#8A9BA8;margin-bottom:3px}
.nblk .tx{font-size:13.5px;color:var(--ink);white-space:pre-wrap;line-height:1.65}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.tag{font-size:11.5px;font-weight:700;border-radius:999px;padding:3px 11px;background:#EEF1F5;color:#8A93A0}
.tag.on{background:#E4F0E9;color:#3E7A5B}
.ed{display:none}.editing .ed{display:block}.editing .ro{display:none}
.grp{border:1px solid #EDEFF3;border-radius:10px;padding:10px 12px;margin-bottom:10px}
.grp .gh{font-size:12px;font-weight:800;color:var(--blue);margin-bottom:8px}
.frow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.frow label{flex:1;min-width:120px;font-size:12px;font-weight:700;color:var(--soft)}
.frow input[type=text],.frow input[type=date],.frow textarea{width:100%;margin-top:4px;border:1px solid #D3DAE2;border-radius:8px;padding:7px 9px;font-size:13.5px;font-family:inherit;color:var(--ink)}
.frow textarea{min-height:56px;resize:vertical}
.checks{display:flex;flex-wrap:wrap;gap:10px 18px}
.checks label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--soft);min-width:auto}
.rmv{background:#fff;color:#B5564E;border:1px solid #E3B7B3;border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:700;cursor:pointer;margin-top:4px}
.addbtn{background:var(--green);color:#fff;border:0;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.hint{font-size:12px;color:#A8AEB6;margin-top:8px}
.empty{text-align:center;color:var(--soft);padding:40px 20px;font-size:14px;line-height:2}
/* vendor table */
table.v{border-collapse:collapse;width:100%;font-size:13.5px}
table.v th,table.v td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:middle}
table.v th{background:#F4F7FA;color:var(--soft);font-size:12px;white-space:nowrap}
table.v input[type=text]{width:100%;border:1px solid #D3DAE2;border-radius:6px;padding:6px 8px;font-family:inherit;font-size:13px}
.acc{font-size:11.5px;font-weight:700;border-radius:999px;padding:2px 10px}
.acc.y{background:#E4F0E9;color:#3E7A5B}.acc.n{background:#F3EFE7;color:#9A855C}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="top">
  <div class="toprow">
    <h1 id="title">專案工作頁</h1>
    <span class="chip" id="budgetChip"></span>
    <span class="spacer"></span>
    <span class="savenote" id="savenote"></span>
    <button class="btn pdf" onclick="exportPdf()">🖨 A4 PDF</button>
    <button class="btn lockbtn" id="lock" onclick="toggleEdit()">✏️ 編輯</button>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab_main" onclick="setTab('main')">📊 排程・注意事項</button>
    <button class="tab" id="tab_vendor" onclick="setTab('vendor')">🧾 廠商報價 / 驗收</button>
  </div>
</div>
<div class="wrap" id="root"><div class="empty">載入中…</div></div>

<script>
const HOLS={"2026-01-01":1,"2026-02-14":1,"2026-02-15":1,"2026-02-16":1,"2026-02-17":1,"2026-02-18":1,"2026-02-19":1,"2026-02-20":1,"2026-02-27":1,"2026-02-28":1,"2026-04-03":1,"2026-04-04":1,"2026-04-05":1,"2026-04-06":1,"2026-05-01":1,"2026-06-19":1,"2026-09-25":1,"2026-09-28":1,"2026-10-09":1,"2026-10-10":1,"2026-10-25":1,"2026-10-26":1,"2026-12-25":1,"2027-01-01":1};
const DAY=86400000;
const esc=t=>String(t==null?'':t).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const iso=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const pd=s=>{s=(s||"").replace(/-/g,"/");const p=s.split("/").map(Number);if(p.length!==3||p.some(isNaN))return null;return new Date(p[0],p[1]-1,p[2]);};
const off=d=>{const w=(d.getDay()+6)%7;return w>=5||HOLS[iso(d)]===1;};
function wdays(s,e){let n=0;const d=new Date(s);while(d<=e){if(!off(d))n++;d.setDate(d.getDate()+1);}return n;}
function qs(k){const m=new RegExp('[?&]'+k+'=([^&]+)').exec(location.search);return m?decodeURIComponent(m[1]):null;}
let ALL=[],P=null,PIDX=-1,editing=false,curTab='main',saveT=null;

function loadData(){
  try{ALL=JSON.parse(localStorage.getItem('engMgmtProData')||'[]');}catch(e){ALL=[];}
  const pid=qs('p');
  PIDX=ALL.findIndex(x=>String(x.id)===String(pid));
  if(PIDX<0&&!isNaN(pid)){const list=ALL.filter(x=>!x.isDaily&&!x.archived);const t=list[Number(pid)];if(t)PIDX=ALL.indexOf(t);}
  P=PIDX>=0?ALL[PIDX]:null;
}
function ensure(t){
  t.detail=t.detail||{};t.steps=t.steps||{};
  const S=t.steps;
  S.stamp=S.stamp||{sent:false,confirmed:false};
  S.contract=S.contract||{signed:false,internalSeal:false,vendorSeal:false,archived:false};
  S.contactDeposit=S.contactDeposit||{invoiceReceived:false,confirmedDate:'',remittanceDate:'',amount:'',percent:''};
  S.contactFinal=S.contactFinal||{invoiceReceived:false,confirmedDate:'',remittanceDate:''};
  if(t.detail.accepted===undefined)t.detail.accepted=false;
  if(t.detail.acceptDate===undefined)t.detail.acceptDate='';
}
function cloudSave(){
  try{localStorage.setItem('engMgmtProData',JSON.stringify(ALL));}catch(e){}
  const n=document.getElementById('savenote');
  let cu=null;try{cu=localStorage.getItem('engMgmtCloudUrl');}catch(e){}
  if(cu){n.textContent='☁️ 同步中…';n.className='savenote ing';
    fetch(cu,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(ALL),mode:'no-cors'})
      .then(()=>{n.textContent='✅ 已同步';n.className='savenote ok';})
      .catch(()=>{n.textContent='⚠️ 本機已存';n.className='savenote ing';});
  }else{n.textContent='✅ 已存（本機）';n.className='savenote ok';}
}
function save(){ALL[PIDX]=P;clearTimeout(saveT);saveT=setTimeout(cloudSave,600);}
function getp(o,path){return path.split('.').reduce((a,k)=>a?a[k]:undefined,o);}
function setp(i,path,val){const t=P.tasks[i];ensure(t);const ks=path.split('.');let o=t;for(let j=0;j<ks.length-1;j++){o[ks[j]]=o[ks[j]]||{};o=o[ks[j]];}o[ks[ks.length-1]]=val;save();if(['name','startDate','endDate','done'].indexOf(path)>-1)render();}

function ganttHTML(){
  const tasks=(P.tasks||[]).map(t=>({name:t.name,s:pd(t.startDate),e:pd(t.endDate),done:t.done})).filter(t=>t.s&&t.e&&t.e>=t.s);
  if(!tasks.length) return '<div class="empty">尚無排程項目'+(editing?'，到下方可新增':'')+'</div>';
  const minD=new Date(Math.min(...tasks.map(t=>+t.s))),maxD=new Date(Math.max(...tasks.map(t=>+t.e)));
  const rs=new Date(minD.getFullYear(),minD.getMonth(),1),re=new Date(maxD.getFullYear(),maxD.getMonth()+1,0);
  const span=(re-rs)+DAY, pct=ms=>ms/span*100;
  let months='',grids='';
  let cur=new Date(rs);
  while(cur<=re){const mS=new Date(cur.getFullYear(),cur.getMonth(),1),mE=new Date(cur.getFullYear(),cur.getMonth()+1,0);
    months+='<div class="mo" style="left:'+pct(mS-rs)+'%;width:'+pct((mE-mS)+DAY)+'%">'+cur.getFullYear()+'/'+(cur.getMonth()+1)+'</div>';cur.setMonth(cur.getMonth()+1);}
  let days='';let wk=new Date(rs);
  while(wk<=re){const l=pct(wk-rs);days+='<div class="dtick" style="left:'+l+'%">'+(wk.getMonth()+1)+'/'+wk.getDate()+'</div>';grids+='<div class="grid" style="left:'+l+'%"></div>';wk=new Date(+wk+7*DAY);}
  const today=new Date();today.setHours(0,0,0,0);const inR=today>=rs&&today<=re;const tL=inR?pct(today-rs):0;
  const tline=inR?'<div class="tline" style="left:'+tL+'%"></div>':'';
  let rows='';
  tasks.forEach(t=>{
    const left=pct(t.s-rs),width=pct((t.e-t.s)+DAY),wd=wdays(t.s,t.e);
    const sd=(t.s.getMonth()+1)+'/'+t.s.getDate(),ed=(t.e.getMonth()+1)+'/'+t.e.getDate();
    rows+='<div class="grow"><div class="glabel"><div class="t">'+esc(t.name)+'</div><div class="d">'+sd+'–'+ed+'・'+wd+'工作天</div></div>'
      +'<div class="gtrack">'+grids+tline+'<div class="bar '+(t.done?'done':'ing')+'" style="left:'+left+'%;width:'+width+'%"><span>'+(width>12?sd:'')+'</span><span>'+(width>18?ed:'')+'</span></div></div></div>';
  });
  return '<div class="gantt"><div class="gwin"><div class="axis"><div class="months">'+months+(inR?'<div class="tlabel" style="left:'+tL+'%">今日</div>':'')+'</div><div class="days">'+days+'</div></div>'+rows
    +'<div class="legend"><span><span class="dot" style="background:#3C6FA8"></span>進行中</span><span><span class="dot" style="background:#5E8C72"></span>已完成</span><span>紅線＝今日・上排為週日期・工作天已扣週末假日</span></div></div></div>';
}

function roTags(S){
  const items=[['簽呈已送',S.stamp.sent],['簽呈確認',S.stamp.confirmed],['合約已簽',S.contract.signed],['內部用印',S.contract.internalSeal],['廠商用印',S.contract.vendorSeal],['合約歸檔',S.contract.archived],['訂金請款',S.contactDeposit.invoiceReceived],['尾款請款',S.contactFinal.invoiceReceived]];
  return '<div class="tags">'+items.map(x=>'<span class="tag'+(x[1]?' on':'')+'">'+(x[1]?'✓ ':'')+x[0]+'</span>').join('')+'</div>';
}
function chk(i,path,label){return '<label><input type="checkbox" '+(getp(P.tasks[i],path)?'checked':'')+' onchange="setp('+i+',\''+path+'\',this.checked)"> '+label+'</label>';}
function ti(i,path,ph){return '<input type="text" value="'+esc(getp(P.tasks[i],path)||'')+'" oninput="setp('+i+',\''+path+'\',this.value)" placeholder="'+(ph||'')+'">';}
function di(i,path){return '<input type="date" value="'+esc((getp(P.tasks[i],path)||'').replace(/\//g,"-"))+'" onchange="setp('+i+',\''+path+'\',this.value)">';}

/* TAB 1: 注意事項（內部：備註 + 簽呈/合約/請款） */
function noteCard(t,i){
  ensure(t);const D=t.detail,S=t.steps;
  const ro='<div class="ro"><div class="th"><span class="tt">'+esc(t.name)+'</span>'+(t.done?'<span class="badge done">✓ 完成</span>':'<span class="badge wait">待執行</span>')+'</div>'
    +'<div class="tmeta">'+esc(t.startDate||'—')+' ~ '+esc(t.endDate||'—')+'</div>'
    +(D.content?'<div class="nblk"><div class="lb">備註 / 內容</div><div class="tx">'+esc(D.content)+'</div></div>':'')
    +(D.tracking?'<div class="nblk"><div class="lb">追蹤</div><div class="tx">'+esc(D.tracking)+'</div></div>':'')
    +roTags(S)+'</div>';
  const ed='<div class="ed">'
    +'<div class="frow"><label>項目名稱'+ti(i,'name')+'</label><label>開始'+di(i,'startDate')+'</label><label>結束'+di(i,'endDate')+'</label></div>'
    +'<div class="checks" style="margin-bottom:10px">'+chk(i,'done','已完成')+'</div>'
    +'<div class="grp"><div class="gh">📝 備註 / 追蹤</div><div class="frow"><label>備註 / 內容<textarea oninput="setp('+i+',\'detail.content\',this.value)">'+esc(D.content||'')+'</textarea></label></div><div class="frow"><label>追蹤<textarea oninput="setp('+i+',\'detail.tracking\',this.value)">'+esc(D.tracking||'')+'</textarea></label></div></div>'
    +'<div class="grp"><div class="gh">🖋 簽呈</div><div class="checks">'+chk(i,'steps.stamp.sent','已送出')+chk(i,'steps.stamp.confirmed','已確認')+'</div></div>'
    +'<div class="grp"><div class="gh">📄 合約</div><div class="checks">'+chk(i,'steps.contract.signed','已簽署')+chk(i,'steps.contract.internalSeal','內部用印')+chk(i,'steps.contract.vendorSeal','廠商用印')+chk(i,'steps.contract.archived','已歸檔')+'</div></div>'
    +'<div class="grp"><div class="gh">💵 訂金</div><div class="checks" style="margin-bottom:8px">'+chk(i,'steps.contactDeposit.invoiceReceived','已收請款單')+'</div><div class="frow"><label>金額'+ti(i,'steps.contactDeposit.amount')+'</label><label>比例(%)'+ti(i,'steps.contactDeposit.percent')+'</label><label>確認日'+di(i,'steps.contactDeposit.confirmedDate')+'</label><label>匯款日'+di(i,'steps.contactDeposit.remittanceDate')+'</label></div></div>'
    +'<div class="grp"><div class="gh">💴 尾款</div><div class="checks" style="margin-bottom:8px">'+chk(i,'steps.contactFinal.invoiceReceived','已收請款單')+'</div><div class="frow"><label>確認日'+di(i,'steps.contactFinal.confirmedDate')+'</label><label>匯款日'+di(i,'steps.contactFinal.remittanceDate')+'</label></div></div>'
    +'<button class="rmv" onclick="rmTask('+i+')">刪除此項目</button></div>';
  return '<div class="tcard">'+ro+ed+'</div>';
}
function notesHTML(){
  const tasks=P.tasks||[];
  if(!tasks.length&&!editing) return '<div class="empty">尚無項目</div>';
  let h=tasks.map((t,i)=>noteCard(t,i)).join('');
  if(editing) h+='<button class="addbtn" onclick="addTask()">＋ 新增項目</button><div class="hint">此頁為你公司內部備註與簽呈/合約/請款勾稽。廠商報價請切到上方「🧾 廠商報價／驗收」分頁。</div>';
  return h;
}

/* TAB 2: 廠商報價 / 驗收 */
function vendorHTML(){
  const tasks=P.tasks||[];
  if(!tasks.length) return '<div class="empty">尚無工項</div>';
  tasks.forEach(ensure);
  const rows=tasks.map((t,i)=>{
    const D=t.detail;
    if(editing){
      return '<tr><td>'+esc(t.name)+'</td><td>'+ti(i,'detail.vendor','廠商')+'</td><td>'+ti(i,'detail.estimatedCost','報價')+'</td><td>'+ti(i,'detail.actualCost','實際')+'</td>'
        +'<td><label class="checks"><input type="checkbox" '+(D.accepted?'checked':'')+' onchange="setp('+i+',\'detail.accepted\',this.checked)"> 已驗收</label></td><td>'+di(i,'detail.acceptDate')+'</td></tr>';
    }
    return '<tr><td><b>'+esc(t.name)+'</b></td><td>'+esc(D.vendor||'—')+'</td><td>'+esc(D.estimatedCost||'—')+'</td><td>'+esc(D.actualCost||'—')+'</td>'
      +'<td><span class="acc '+(D.accepted?'y':'n')+'">'+(D.accepted?'✓ 已驗收':'待驗收')+'</span></td><td>'+esc(D.acceptDate||'—')+'</td></tr>';
  }).join('');
  return '<div style="overflow-x:auto"><table class="v"><tr><th>工項</th><th>廠商</th><th>報價</th><th>實際金額</th><th>驗收</th><th>驗收日</th></tr>'+rows+'</table></div>'
    +(editing?'<div class="hint" style="margin-top:12px">記錄各工項的廠商、報價、實際金額與驗收狀態。內部簽呈/合約/請款在「📊 排程・注意事項」分頁。</div>':'');
}

function render(){
  const root=document.getElementById('root');
  if(curTab==='vendor'){
    root.innerHTML='<div class="panel"><div class="sec-h">🧾 廠商報價 / 驗收<span class="ln"></span></div>'+vendorHTML()+'</div>';
  }else{
    root.innerHTML='<div class="panel"><div class="sec-h">📊 排程甘特圖<span class="ln"></span></div>'+ganttHTML()+'</div>'
      +'<div class="panel"><div class="sec-h">📝 注意事項（內部備註・簽呈・合約・請款勾稽）<span class="ln"></span></div>'+notesHTML()+'</div>';
  }
  document.body.classList.toggle('editing',editing);
}
function setTab(t){curTab=t;document.getElementById('tab_main').classList.toggle('on',t==='main');document.getElementById('tab_vendor').classList.toggle('on',t==='vendor');render();}
function addTask(){P.tasks=P.tasks||[];const t=iso(new Date());const nt={id:'t'+Date.now(),name:'新項目',startDate:t,endDate:t,done:false,taskBudget:''};ensure(nt);P.tasks.push(nt);save();render();}
function rmTask(i){if(!confirm('刪除這個項目？'))return;P.tasks.splice(i,1);save();render();}
function toggleEdit(){editing=!editing;setLock();render();}
function setLock(){const b=document.getElementById('lock');b.textContent=editing?'👁 切換檢視':'✏️ 編輯';b.className='btn lockbtn'+(editing?' on':'');}
function exportPdf(){
  const wasEdit=editing;editing=false;render();
  const wrap=document.createElement('div');wrap.style.cssText='padding:18px;background:#fff;width:1080px;font-family:sans-serif';
  wrap.innerHTML='<div style="font-size:20px;font-weight:800;color:#2E5B8F;margin-bottom:10px">'+esc(P.name)+'</div>'+document.getElementById('root').innerHTML;
  editing=wasEdit;render();
  document.body.appendChild(wrap);
  html2pdf().set({margin:8,filename:(P.name||'專案')+'.pdf',image:{type:'jpeg',quality:.95},html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'landscape'}}).from(wrap).save().then(()=>wrap.remove()).catch(()=>wrap.remove());
}
function boot(){
  loadData();
  if(!P){document.getElementById('root').innerHTML='<div class="empty">找不到這個專案<br>請先在平台開一次以完成雲端同步</div>';return;}
  document.getElementById('title').textContent='📐 '+P.name;
  document.getElementById('budgetChip').textContent='💰 總預算 '+(P.totalBudget||'—')+' 元';
  setLock();render();
}
boot();
</script>
</body>
