<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>廠商資料｜設計工程平台</title>
<style>
*{box-sizing:border-box}
:root{--blue:#2E5B8F;--green:#76977E;--ink:#3F4C58;--muted:#84909B;--line:#DFE5EB;--paper:#FFF;--bg:#F4F6F8;--warn:#B77A28;--danger:#B5564E}
body{margin:0;font-family:"Microsoft JhengHei","PingFang TC",sans-serif;background:var(--bg);color:var(--ink);padding:0 0 74px}
.top{background:var(--blue);color:#fff;padding:15px 22px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:6;box-shadow:0 2px 8px #173c6630}
.top h1{font-size:18px;margin:0;flex:1}.top small{font-size:12px;font-weight:500;opacity:.75;margin-left:8px}
.btn{border:0;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn.add{background:#A7BE91;color:#24422E}.btn.pri{background:var(--blue);color:#fff}.btn.gho{background:#fff;color:#596875;border:1px solid #C8D3DD}.btn.del{background:#fff;color:var(--danger);border:1px solid #E4BAB6}
.wrap{max-width:1180px;margin:0 auto;padding:20px}
.intro{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:14px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;box-shadow:0 5px 18px #324d6810}
.intro .copy{flex:1;min-width:250px}.intro h2{font-size:15px;color:var(--blue);margin:0 0 4px}.intro p{font-size:12px;color:var(--muted);margin:0;line-height:1.7}
.stats{display:flex;gap:9px;flex-wrap:wrap}.stat{background:#F4F7FA;border:1px solid #E1E8EF;border-radius:9px;padding:8px 12px;min-width:88px}.stat b{display:block;color:var(--blue);font-size:18px}.stat span{font-size:11px;color:var(--muted)}
.tools{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:16px;display:grid;grid-template-columns:minmax(220px,1fr) 210px auto;gap:10px;align-items:center}
.field{width:100%;border:1px solid #CBD5DF;border-radius:8px;padding:10px 12px;font:14px inherit;color:var(--ink);background:#fff}.result{font-size:12px;color:var(--muted);text-align:right;padding-right:4px}
.catblk{margin-bottom:18px}.cathd{font-size:13px;font-weight:800;color:var(--blue);background:#EAF0F6;border:1px solid #D5E0EB;border-radius:10px 10px 0 0;padding:9px 14px;display:flex;justify-content:space-between}.cathd span{font-weight:600;color:#8496A8}
.card{background:var(--paper);border:1px solid var(--line);border-top:0;padding:14px 16px;display:grid;grid-template-columns:minmax(190px,1.2fr) minmax(145px,.8fr) minmax(145px,.8fr) minmax(220px,1.4fr) auto;gap:14px;align-items:start}
.card:last-child{border-radius:0 0 10px 10px}.card+.card{border-top:1px dashed #E7EBEF}.f{min-width:0}.lb{font-size:10px;color:#97A1AA;margin-bottom:3px;letter-spacing:.04em}.vl{font-size:13px;color:#3A4652;font-weight:600;line-height:1.55;overflow-wrap:anywhere}.vendor-name{font-size:15px;color:#294F7B}.code{font-size:10px;background:#EEF3F8;color:#66809A;border-radius:4px;padding:2px 5px;margin-left:5px;vertical-align:2px}
.detail{grid-column:1/5;display:flex;gap:9px;flex-wrap:wrap}.pill{font-size:11px;color:#64727E;background:#F5F7F9;border:1px solid #E2E7EB;padding:5px 8px;border-radius:6px}.bank{color:#3E5772;background:#F2F6FA;border-color:#D7E2ED}.bank-link{font-family:inherit;cursor:pointer}.bank-link:hover{background:#E5EEF7;border-color:#AFC5DA;color:#294F7B}.ok{color:#4E704F;background:#EDF5E8;border-color:#D4E5CC}.wait{color:#91601F;background:#FFF6E4;border-color:#ECD8AE}.none{color:#8B6C68;background:#FAEFED;border-color:#E9D2CE}
.acts{grid-column:5;grid-row:1/3;display:flex;gap:7px;align-items:flex-start}.empty{text-align:center;color:#8E99A3;padding:70px 20px;font-size:14px;line-height:2;background:#fff;border:1px solid var(--line);border-radius:12px}
.mask{display:none;position:fixed;inset:0;background:rgba(24,38,52,.45);z-index:20;align-items:flex-start;justify-content:center;overflow:auto;padding:28px 14px}.mask.on{display:flex}
.modal{background:#fff;border-radius:14px;width:720px;max-width:100%;padding:20px 22px;box-shadow:0 20px 60px #18263545}.modal h2{font-size:17px;color:var(--blue);margin:0 0 14px}.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.image-modal{width:860px}.image-head{display:flex;align-items:flex-start;gap:12px}.image-head h2{flex:1}.image-box{min-height:280px;border:1px solid #D9E1E8;border-radius:10px;background:#F5F7F9;display:flex;align-items:center;justify-content:center;padding:12px;color:#87939E;text-align:center;line-height:1.8}.image-box img{display:block;max-width:100%;max-height:68vh;object-fit:contain;border-radius:6px}.image-note{font-size:12px;color:#7E8993;margin:0 0 12px;line-height:1.7}.close-x{border:0;background:#EEF2F6;color:#637485;border-radius:7px;width:32px;height:32px;cursor:pointer;font-size:18px}
label{display:block;flex:1;min-width:170px;font-size:12px;color:#706F6B;font-weight:700}label input,label select,label textarea{width:100%;margin-top:5px;border:1px solid #CBD4DD;border-radius:7px;padding:9px 10px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff}label textarea{resize:vertical;min-height:62px}.sec{font-size:12px;font-weight:800;color:#71869B;margin:12px 0 8px;border-top:1px solid #EDF0F2;padding-top:12px}.hint{font-size:11px;color:#9A948C;font-weight:500;margin-top:4px}.modacts{display:flex;justify-content:flex-end;gap:10px;margin-top:10px}
@media(max-width:820px){.tools{grid-template-columns:1fr}.result{text-align:left}.card{grid-template-columns:1fr 1fr}.detail{grid-column:1/3}.acts{grid-column:1/3;grid-row:auto}.top small{display:none}}
@media(max-width:520px){.wrap{padding:12px}.card{grid-template-columns:1fr}.detail,.acts{grid-column:1}.top{padding:12px}.top h1{font-size:16px}}
</style>
</head>
<body>
<div class="top"><h1>🏢 廠商資料 <small>設計工程平台</small></h1><button class="btn add" onclick="openForm()">＋ 新增廠商</button></div>
<main class="wrap">
  <section class="intro">
    <div class="copy"><h2>廠商主檔</h2><p>廠商可依工種搜尋與編輯；匯款資訊僅顯示銀行與帳號末四碼。完整帳號及附件不會放在公開網站程式碼中。</p></div>
    <div class="stats"><div class="stat"><b id="sTotal">0</b><span>廠商總數</span></div><div class="stat"><b id="sCats">0</b><span>工種分類</span></div><div class="stat"><b id="sBank">0</b><span>有匯款資料</span></div></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><div style="display:flex;gap:6px"><button class="btn pri" onclick="linkImageFolder()">連結圖片資料夾</button><button class="btn gho" onclick="document.getElementById('imageInput').click()">匯入圖片</button></div><span id="imageStatus" style="font-size:12px;color:#7E8993">檢查圖片中…</span></div>
  </section>
  <section class="tools">
    <input class="field" id="q" placeholder="搜尋廠商、窗口、電話、服務項目…" oninput="render()">
    <select class="field" id="catFilter" onchange="render()"><option value="">全部工種</option></select>
    <div class="result" id="resultCount"></div>
  </section>
  <div id="list"></div>
  <input type="file" id="imageInput" accept="image/png,image/jpeg" multiple hidden onchange="importBankImages(this.files);this.value=''">
</main>

<div class="mask" id="mask" onclick="if(event.target===this)closeForm()">
  <div class="modal">
    <h2 id="mtitle">新增廠商</h2>
    <div class="row"><label>廠商名稱*<input id="f_name"></label><label>平台主分類<input id="f_cat" list="catlist"><datalist id="catlist"></datalist></label><label>狀態<select id="f_status"><option>啟用</option><option>停用</option><option>待確認</option></select></label></div>
    <div class="sec">聯絡資訊</div>
    <div class="row"><label>廠商窗口<input id="f_person"></label><label>聯絡電話<input id="f_phone"></label></div>
    <div class="row"><label>LINE 名稱<input id="f_lineName"></label><label>LINE ID<input id="f_lineId"></label></div>
    <div class="sec">服務與合作</div>
    <div class="row"><label>服務項目／優勢特長<textarea id="f_services"></textarea></label><label>合作專案<textarea id="f_projects"></textarea></label></div>
    <div class="sec">匯款資訊</div>
    <div class="row"><label>銀行名稱<input id="f_bank"></label><label>分行<input id="f_branch"></label><label>帳號末四碼<input id="f_acctLast4" maxlength="4" inputmode="numeric"><div class="hint">平台只保存並顯示末四碼</div></label></div>
    <div class="row"><label>戶名<input id="f_holder"></label><label>資料狀態<select id="f_bankStatus"><option value="">未設定</option><option>已確認</option><option>圖片轉錄待覆核</option><option>代墊／未提供</option><option>待補資料</option></select></label></div>
    <div class="row"><label>整理備註<textarea id="f_note"></textarea></label></div>
    <div class="modacts"><button class="btn gho" onclick="closeForm()">取消</button><button class="btn pri" onclick="save()">儲存</button></div>
  </div>
</div>

<div class="mask" id="bankMask" onclick="if(event.target===this)closeBankImage()">
  <div class="modal image-modal">
    <div class="image-head"><h2 id="bankTitle">匯款帳戶圖片</h2><button class="close-x" onclick="closeBankImage()" aria-label="關閉">×</button></div>
    <p class="image-note" id="bankImageNote">帳戶圖片只保存在這個瀏覽器，不會上傳到公開網站。</p>
    <div class="image-box" id="bankImageBody">讀取中…</div>
    <div class="modacts"><button class="btn gho" onclick="linkImageFolder()">連結圖片資料夾</button><button class="btn gho" onclick="document.getElementById('imageInput').click()">匯入／更換圖片</button><button class="btn pri" onclick="closeBankImage()">關閉</button></div>
  </div>
</div>

}

  const shown=data.filter(v=>(!cf||(v.cat||'未分類')===cf)&&(!q||norm([v.name,v.cat,v.person,v.phone,v.services,v.projects,v.lineName,v.lineId].join(' ')).includes(q)));
  document.getElementById('sTotal').textContent=data.length;document.getElementById('sCats').textContent=cats.length;document.getElementById('sBank').textContent=data.filter(v=>v.bank||v.acctLast4||v.acct).length;document.getElementById('resultCount').textContent='顯示 '+shown.length+'／'+data.length+' 筆';
  const list=document.getElementById('list');if(!shown.length){list.innerHTML='<div class="empty">找不到符合條件的廠商資料</div>';return}
  const groups={};shown.forEach(v=>{const c=v.cat||'未分類';(groups[c]??=[]).push(v)});
  list.innerHTML=Object.keys(groups).sort((a,b)=>a.localeCompare(b,'zh-Hant')).map(cat=>'<section class="catblk"><div class="cathd">'+esc(cat)+'<span>'+groups[cat].length+' 家</span></div>'+groups[cat].sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant')).map(v=>{
    const line=[v.lineName||v.line,v.lineId].filter(Boolean).join('／');const acct=v.acctLast4||last4(v.acct);const bank=[v.bank,v.branch].filter(Boolean).join(' ');const details=[];
    if(v.services)details.push('<span class="pill">服務：'+esc(v.services)+'</span>');if(v.projects)details.push('<span class="pill">合作：'+esc(v.projects)+'</span>');if(bank||acct)details.push('<button type="button" class="pill bank bank-link" onclick="openBankImage(\''+esc(v.code||'')+'\')">🏦 '+esc(bank)+(acct?'　•••• '+esc(acct):'')+'　🖼</button>');if(v.bankStatus)details.push('<span class="pill '+statusClass(v.bankStatus)+'">'+esc(v.bankStatus)+'</span>');if(v.note)details.push('<span class="pill">備註：'+esc(v.note)+'</span>');
    return '<article class="card"><div class="f"><div class="lb">廠商名稱</div><div class="vl vendor-name">'+esc(v.name)+(v.code?'<span class="code">'+esc(v.code)+'</span>':'')+'</div></div><div class="f"><div class="lb">廠商窗口</div><div class="vl">'+esc(v.person||'—')+'</div></div><div class="f"><div class="lb">聯絡電話</div><div class="vl">'+esc(v.phone||'—')+'</div></div><div class="f"><div class="lb">LINE／聯絡資訊</div><div class="vl">'+esc(line||v.addr||'—')+'</div></div><div class="acts"><button class="btn gho" onclick="openForm(\''+esc(v.id)+'\')">編輯</button><button class="btn del" onclick="delVendor(\''+esc(v.id)+'\')">刪除</button></div><div class="detail">'+details.join('')+'</div></article>'
  }).join('')+'</section>').join('')
}
function openForm(id){
  editId=id||null;const v=id?(data.find(x=>x.id===id)||{}):{status:'啟用'};document.getElementById('mtitle').textContent=id?'編輯廠商':'新增廠商';
  const fields=['name','cat','status','person','phone','lineName','lineId','services','projects','bank','branch','holder','bankStatus','note'];fields.forEach(k=>document.getElementById('f_'+k).value=v[k]||(k==='lineName'?v.line:'')||'');document.getElementById('f_acctLast4').value=v.acctLast4||last4(v.acct);document.getElementById('mask').classList.add('on');setTimeout(()=>document.getElementById('f_name').focus(),50)
}
function closeForm(){document.getElementById('mask').classList.remove('on')}
function save(){
  const g=k=>document.getElementById('f_'+k).value.trim();if(!g('name')){alert('請填廠商名稱');return}const old=editId?(data.find(x=>x.id===editId)||{}):{};
  const obj={...old,id:editId||('v'+Date.now()),name:g('name'),cat:g('cat'),status:g('status')||'啟用',person:g('person'),phone:g('phone'),lineName:g('lineName'),lineId:g('lineId'),services:g('services'),projects:g('projects'),bank:g('bank'),branch:g('branch'),acctLast4:last4(g('acctLast4')),holder:g('holder'),bankStatus:g('bankStatus'),note:g('note')};
  if(editId){const i=data.findIndex(x=>x.id===editId);data[i]=obj}else data.push(obj);persist();closeForm();render()
}
function delVendor(id){const v=data.find(x=>x.id===id);if(!v||!confirm('確定刪除「'+v.name+'」？'))return;data=data.filter(x=>x.id!==id);persist();render()}
function openImageDb(){return new Promise((resolve,reject)=>{if(!('indexedDB'in window)){reject(new Error('此瀏覽器不支援圖片儲存'));return}const req=indexedDB.open(IMAGE_DB,1);req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(IMAGE_STORE))db.createObjectStore(IMAGE_STORE)};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)})}
async function putPrivate(key,value){const db=await openImageDb();return new Promise((resolve,reject)=>{const tx=db.transaction(IMAGE_STORE,'readwrite');tx.objectStore(IMAGE_STORE).put(value,key);tx.oncomplete=()=>{db.close();resolve()};tx.onerror=()=>{db.close();reject(tx.error)}})}
async function getPrivate(key){const db=await openImageDb();return new Promise((resolve,reject)=>{const tx=db.transaction(IMAGE_STORE,'readonly'),req=tx.objectStore(IMAGE_STORE).get(key);req.onsuccess=()=>{db.close();resolve(req.result||null)};req.onerror=()=>{db.close();reject(req.error)}})}
async function putBankImage(name,file){const type=file.type||(/\.png$/i.test(file.name)?'image/png':'image/jpeg'),blob=new Blob([await file.arrayBuffer()],{type});return putPrivate(name,blob)}
async function folderFile(name,askPermission){const folder=await getPrivate(FOLDER_KEY);if(!folder)return null;let permission=await folder.queryPermission({mode:'read'});if(permission!=='granted'&&askPermission)permission=await folder.requestPermission({mode:'read'});if(permission!=='granted')return null;try{return await (await folder.getFileHandle(name)).getFile()}catch(e){return null}}
async function getBankImage(name){return (await getPrivate(name))||(await folderFile(name,true))}
async function linkImageFolder(){if(!window.showDirectoryPicker){alert('此功能需要使用 Chrome 開啟');return}try{const folder=await window.showDirectoryPicker({mode:'read'});await putPrivate(FOLDER_KEY,folder);await refreshImageStatus();if(activeBankCode)await openBankImage(activeBankCode)}catch(e){if(e.name!=='AbortError')alert('資料夾連結失敗：'+e.message)}}
async function refreshImageStatus(){const el=document.getElementById('imageStatus');try{const db=await openImageDb(),keys=await new Promise((resolve,reject)=>{const tx=db.transaction(IMAGE_STORE,'readonly'),req=tx.objectStore(IMAGE_STORE).getAllKeys();req.onsuccess=()=>resolve(req.result||[]);req.onerror=()=>reject(req.error)});db.close();const found=new Set(keys.map(String).filter(k=>Object.values(IMAGE_MAP).includes(k))),folder=await getPrivate(FOLDER_KEY);if(folder&&await folder.queryPermission({mode:'read'})==='granted'){for(const name of Object.values(IMAGE_MAP)){try{await folder.getFileHandle(name);found.add(name)}catch(e){}}}el.textContent=(folder?'已連結資料夾；':'')+'找到 '+found.size+'／'+Object.keys(IMAGE_MAP).length+' 張'}catch(e){el.textContent='無法檢查圖片'}}
async function importBankImages(files){
  if(!files?.length)return;const expected=new Map(Object.values(IMAGE_MAP).map(n=>[n.toLowerCase(),n]));let imported=0,skipped=0;
  try{for(const file of files){const canonical=expected.get(file.name.toLowerCase());if(!canonical){skipped++;continue}await putBankImage(canonical,file);imported++}await refreshImageStatus();if(activeBankCode)await openBankImage(activeBankCode);alert('已匯入 '+imported+' 張帳戶圖片'+(skipped?'；另有 '+skipped+' 個檔案名稱無法對應':'')+'。圖片已立即更新。')}catch(e){alert('圖片匯入失敗：'+e.message)
  }
}
let activeBankCode='';
function imageDataUrl(blob){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(reader.result);reader.onerror=()=>reject(reader.error||new Error('無法讀取圖片'));reader.readAsDataURL(blob)})}
async function openBankImage(code){
  activeBankCode=code;
  const v=data.find(x=>x.code===code),mask=document.getElementById('bankMask'),body=document.getElementById('bankImageBody');document.getElementById('bankTitle').textContent=(v?.name||'廠商')+'｜匯款帳戶圖片';document.getElementById('bankImageNote').textContent='帳戶圖片只保存在這個瀏覽器，不會上傳到公開網站。';body.textContent='讀取中…';mask.classList.add('on');
  const fileName=IMAGE_MAP[code];if(!fileName){body.innerHTML='這筆帳戶在原 Excel 中沒有可用圖片。';return}
  try{const blob=await getBankImage(fileName);if(!blob){body.innerHTML='尚未匯入這家廠商的帳戶圖片。<br>請按下方「匯入／更換圖片」，或使用頁面上方的「匯入帳戶圖片」一次選取全部圖片。';return}const dataUrl=await imageDataUrl(blob);body.innerHTML='';const img=document.createElement('img');img.alt=(v?.name||'廠商')+'匯款帳戶圖片';img.onload=()=>{document.getElementById('bankImageNote').textContent='帳戶圖片只保存在這個瀏覽器，不會上傳到公開網站。'};img.onerror=()=>{body.innerHTML='圖片無法顯示，請按下方「匯入／更換圖片」重新匯入這一張。'};img.src=dataUrl;body.appendChild(img)}catch(e){body.textContent='圖片讀取失敗：'+e.message}
}
function closeBankImage(){activeBankCode='';document.getElementById('bankMask').classList.remove('on')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeForm();closeBankImage()}});render();refreshImageStatus();
</script>
