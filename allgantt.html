<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>全部專案排程總覽</title>
<style>
*{box-sizing:border-box}
:root{--blue:#2E5B8F;--ink:#33404D;--soft:#6B7885;--line:#E6E9EE;--bg:#F5F7FA}
body{margin:0;font-family:"Microsoft JhengHei","PingFang TC","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);padding:0 0 70px}
.top{background:linear-gradient(120deg,#2E5B8F,#3C6FA8);color:#fff;padding:16px 26px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:8;flex-wrap:wrap;box-shadow:0 2px 10px rgba(30,60,110,.18)}
.top h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.5px;flex:1}
.btn{border:0;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}
.pdf{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.35)}
.chip{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.26);border-radius:999px;padding:4px 12px;font-size:12.5px;font-weight:700;cursor:pointer;color:#fff}
.chip.off{opacity:.45}
.wrap{max-width:1240px;margin:0 auto;padding:20px 22px}
.panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px 22px;box-shadow:0 4px 18px rgba(40,70,120,.06)}
.gantt{overflow-x:auto}
.gwin{min-width:720px}
.months{display:flex;position:relative;height:28px;margin-left:250px;border-bottom:1px solid var(--line)}
.mo{position:absolute;top:0;font-size:12px;font-weight:700;color:var(--soft);border-left:1px solid var(--line);padding:4px 0 0 8px;height:100%}
.tlabel{position:absolute;top:-2px;font-size:10.5px;color:#D9534F;font-weight:800;transform:translateX(-50%)}
.phead{display:flex;align-items:center;gap:8px;margin:16px 0 2px;font-size:14px;font-weight:800}
.pdot{width:12px;height:12px;border-radius:4px}
.grow{display:flex;align-items:center;height:40px}
.glabel{width:250px;flex-shrink:0;padding-right:14px}
.glabel .t{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.glabel .d{font-size:11px;color:var(--soft)}
.gtrack{position:relative;flex:1;height:100%;border-top:1px solid #F4F6F8}
.gtrack .grid{position:absolute;top:0;bottom:0;width:1px;background:#F0F2F6}
.gtrack .tline{position:absolute;top:0;bottom:0;width:2px;background:#D9534F;opacity:.6}
.bar{position:absolute;top:50%;transform:translateY(-50%);height:20px;border-radius:10px;box-shadow:0 2px 5px rgba(40,70,120,.22);opacity:.95}
.empty{text-align:center;color:var(--soft);padding:50px 20px;font-size:14px;line-height:2}
.legend{font-size:12px;color:var(--soft);margin-top:16px;display:flex;gap:16px;flex-wrap:wrap}
.dot{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:5px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="top">
  <h1>📊 全部專案排程總覽</h1>
  <span id="chips"></span>
  <button class="btn pdf" onclick="exportPdf()">🖨 A4 PDF</button>
</div>
<div class="wrap"><div class="panel" id="panel"><div class="empty">載入中…</div></div></div>
<script>
const HOLS={"2026-01-01":1,"2026-02-14":1,"2026-02-15":1,"2026-02-16":1,"2026-02-17":1,"2026-02-18":1,"2026-02-19":1,"2026-02-20":1,"2026-02-27":1,"2026-02-28":1,"2026-04-03":1,"2026-04-04":1,"2026-04-05":1,"2026-04-06":1,"2026-05-01":1,"2026-06-19":1,"2026-09-25":1,"2026-09-28":1,"2026-10-09":1,"2026-10-10":1,"2026-10-25":1,"2026-10-26":1,"2026-12-25":1,"2027-01-01":1};
const DAY=86400000, COLORS=["#3C6FA8","#B07A3C","#5E8C72","#8E5E8C","#A3803B","#4C7A8C","#9C5B5B"];
const esc=t=>String(t==null?'':t).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const iso=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const pd=s=>{s=(s||"").replace(/-/g,"/");const p=s.split("/").map(Number);if(p.length!==3||p.some(isNaN))return null;return new Date(p[0],p[1]-1,p[2]);};
const off=d=>{const w=(d.getDay()+6)%7;return w>=5||HOLS[iso(d)]===1;};
let PROJS=[], hidden={};
function load(){
  let d=[];try{d=JSON.parse(localStorage.getItem('engMgmtProData')||'[]');}catch(e){}
  PROJS=(Array.isArray(d)?d:[]).filter(p=>!p.isDaily&&!p.archived).map((p,i)=>({
    name:p.name||'未命名', color:COLORS[i%COLORS.length],
    tasks:(p.tasks||[]).map(t=>({name:t.name,s:pd(t.startDate),e:pd(t.endDate),done:t.done})).filter(t=>t.s&&t.e&&t.e>=t.s)
  }));
}
function render(){
  const shown=PROJS.filter(p=>!hidden[p.name]);
  document.getElementById('chips').innerHTML=PROJS.map(p=>'<span class="chip'+(hidden[p.name]?' off':'')+'" style="background:'+(hidden[p.name]?'rgba(255,255,255,.14)':p.color)+'" onclick="toggle(\''+esc(p.name).replace(/'/g,"\\'")+'\')">'+esc(p.name.slice(0,10))+'</span>').join(' ');
  const all=shown.reduce((a,p)=>a.concat(p.tasks),[]);
  const panel=document.getElementById('panel');
  if(!all.length){ panel.innerHTML='<div class="empty">'+(PROJS.length?'目前沒有勾選要顯示的專案':'尚無專案資料，請先在平台開一次專案以完成雲端同步')+'</div>'; return; }
  const minD=new Date(Math.min(...all.map(t=>+t.s))),maxD=new Date(Math.max(...all.map(t=>+t.e)));
  const rs=new Date(minD.getFullYear(),minD.getMonth(),1),re=new Date(maxD.getFullYear(),maxD.getMonth()+1,0);
  const span=(re-rs)+DAY, pct=ms=>ms/span*100;
  let months='',grids='';let cur=new Date(rs);
  while(cur<=re){const mS=new Date(cur.getFullYear(),cur.getMonth(),1),mE=new Date(cur.getFullYear(),cur.getMonth()+1,0);
    months+='<div class="mo" style="left:'+pct(mS-rs)+'%;width:'+pct((mE-mS)+DAY)+'%">'+cur.getFullYear()+'/'+(cur.getMonth()+1)+'</div>';
    grids+='<div class="grid" style="left:'+pct(mS-rs)+'%"></div>';cur.setMonth(cur.getMonth()+1);}
  const today=new Date();today.setHours(0,0,0,0);const inR=today>=rs&&today<=re;const tL=inR?pct(today-rs):0;
  const tline=inR?'<div class="tline" style="left:'+tL+'%"></div>':'';
  let body='';
  shown.forEach(p=>{
    body+='<div class="phead" style="color:'+p.color+'"><span class="pdot" style="background:'+p.color+'"></span>'+esc(p.name)+'</div>';
    p.tasks.forEach(t=>{
      body+='<div class="grow"><div class="glabel"><div class="t">'+esc(t.name)+'</div><div class="d">'+(t.s.getMonth()+1)+'/'+t.s.getDate()+'–'+(t.e.getMonth()+1)+'/'+t.e.getDate()+'</div></div>'
        +'<div class="gtrack">'+grids+tline+'<div class="bar" style="left:'+pct(t.s-rs)+'%;width:'+pct((t.e-t.s)+DAY)+'%;background:'+p.color+(t.done?';opacity:.45':'')+'"></div></div></div>';
    });
  });
  panel.innerHTML='<div class="gantt"><div class="gwin"><div class="months">'+months+(inR?'<div class="tlabel" style="left:'+tL+'%">今日</div>':'')+'</div>'+body
    +'<div class="legend"><span>每個顏色＝一個專案（可點上方色籤開關）</span><span>淡色＝已完成</span><span>紅線＝今日</span></div></div></div>';
}
function toggle(nm){hidden[nm]=!hidden[nm];render();}
function exportPdf(){
  const wrap=document.createElement('div');wrap.style.cssText='padding:18px;background:#fff;width:1150px;font-family:sans-serif';
  wrap.innerHTML='<div style="font-size:20px;font-weight:800;color:#2E5B8F;margin-bottom:10px">全部專案排程總覽</div>'+document.getElementById('panel').innerHTML;
  document.body.appendChild(wrap);
  html2pdf().set({margin:8,filename:'全部專案排程.pdf',image:{type:'jpeg',quality:.95},html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'landscape'}}).from(wrap).save().then(()=>wrap.remove()).catch(()=>wrap.remove());
}
load();render();
</script>
</body>
</html>
